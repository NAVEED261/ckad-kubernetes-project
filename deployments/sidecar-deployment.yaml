# Multi-Container Pod - Sidecar Pattern
# CKAD Topic: Application Design & Build
# Sidecar container reads logs written by main app

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sidecar-logger
  namespace: dev
  labels:
    app: sidecar-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sidecar-demo
  template:
    metadata:
      labels:
        app: sidecar-demo
    spec:
      containers:
        # Main application container
        - name: app-container
          image: busybox
          command: ["/bin/sh", "-c"]
          args:
            - while true; do
                echo "$(date) - App log entry" >> /var/log/app/app.log;
                sleep 5;
              done
          volumeMounts:
            - name: shared-logs
              mountPath: /var/log/app

        # Sidecar: reads and streams logs
        - name: log-sidecar
          image: busybox
          command: ["/bin/sh", "-c"]
          args:
            - tail -f /var/log/app/app.log
          volumeMounts:
            - name: shared-logs
              mountPath: /var/log/app

      # Shared volume between containers
      volumes:
        - name: shared-logs
          emptyDir: {}
