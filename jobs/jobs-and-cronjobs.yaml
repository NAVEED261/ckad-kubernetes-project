# Jobs & CronJobs - CKAD Topic: Application Design & Build
# Run-to-completion workloads

---
# 1. One-time Job (e.g., database migration)
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration-job
  namespace: dev
spec:
  completions: 1          # Number of successful completions needed
  parallelism: 1          # Pods running in parallel
  backoffLimit: 3         # Retry on failure (max 3 times)
  ttlSecondsAfterFinished: 300  # Clean up after 5 minutes

  template:
    metadata:
      labels:
        job: db-migration
    spec:
      restartPolicy: OnFailure   # Required for Jobs (Never or OnFailure)
      containers:
        - name: migration
          image: busybox
          command: ["/bin/sh", "-c"]
          args:
            - echo "Running database migration...";
              sleep 10;
              echo "Migration complete!"
          resources:
            requests:
              memory: "32Mi"
              cpu: "100m"
            limits:
              memory: "64Mi"
              cpu: "200m"

---
# 2. CronJob - Scheduled task (e.g., nightly report)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly-report
  namespace: dev
spec:
  schedule: "0 2 * * *"           # Every night at 2:00 AM
  concurrencyPolicy: Forbid        # Don't run if previous is still running
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: report-generator
              image: busybox
              command: ["/bin/sh", "-c"]
              args:
                - echo "Generating nightly report for $(date)";
                  echo "Report saved."
