# NetworkPolicy - CKAD Topic: Services & Networking
# Control traffic between pods

---
# 1. Default deny all ingress (lockdown policy)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: dev
spec:
  podSelector: {}       # Applies to ALL pods in namespace
  policyTypes:
    - Ingress           # Block all incoming traffic by default

---
# 2. Allow only frontend to reach backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: dev
spec:
  # This policy applies to backend pods
  podSelector:
    matchLabels:
      tier: backend

  policyTypes:
    - Ingress

  ingress:
    - from:
        # Only allow traffic from frontend pods
        - podSelector:
            matchLabels:
              tier: frontend
      ports:
        - protocol: TCP
          port: 8080

---
# 3. Allow same namespace communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: dev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dev
