# Pod with Liveness & Readiness Probes + Resource Limits
# CKAD Topic: Application Observability & Maintenance
# Apply with: kubectl apply -f pods/webapp-pod.yaml -n dev

apiVersion: v1
kind: Pod
metadata:
  name: webapp-pod
  namespace: dev
  labels:
    app: webapp
    tier: frontend
spec:
  containers:
    - name: webapp
      image: nginx:1.21
      ports:
        - containerPort: 80

      # Resource requests and limits (CKAD: always set these!)
      resources:
        requests:
          memory: "64Mi"
          cpu: "250m"
        limits:
          memory: "128Mi"
          cpu: "500m"

      # Liveness Probe: restart container if unhealthy
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 15
        failureThreshold: 3

      # Readiness Probe: only send traffic when app is ready
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 10

      # Environment variables from ConfigMap
      envFrom:
        - configMapRef:
            name: webapp-config

      # Volume mount for custom config
      volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/conf.d
          readOnly: true

  # Restart policy
  restartPolicy: Always

  volumes:
    - name: config-volume
      configMap:
        name: webapp-config
